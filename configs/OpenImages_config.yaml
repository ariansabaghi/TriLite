dataset_name: OpenImages
data_roots: '/mnt/windows/datasets/open_images/OpenImages_images'
mask_root: '/mnt/windows/datasets/open_images/OpenImages_annotations'
metadata_root: 'metadata/OpenImages'

num_classes: 100
lr: 1.0e-5
lr_multiplier: 10
batch_size: 32
alpha: 3
output_channels: 3
drop_out_value_loc: 0
drop_out_value_cls: 0.5
epochs: 100
early_stopping_patience: 10

backbone: dinov2
embedding_dim: 384

cam_curve_interval: 0.005
resize_size: 480
crop_size: 448
resize_eval: 448
IMAGE_MEAN_VALUE: [0.485, 0.456, 0.406]
IMAGE_STD_VALUE: [0.229, 0.224, 0.225]

multi_contour_eval: true
iou_threshold_list: [30, 50, 70]

weight_decay: 0.01
log_dir: "./runs/open_images"
experiment_name: "test_clean"
workers: 8
